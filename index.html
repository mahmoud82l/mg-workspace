<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work Space - Mahmoud Gamal</title>
    <style>
        :root {
            --bg-color: #0d1117; 
            --card-bg: #161b22;
            --primary: #58a6ff;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
            --danger: #f85149;
            --success: #2ea043;
            --warning: #d29922;
            --gold: #ffd700;
        }

        body {
            background-color: var(--bg-color); color: var(--text-main); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden;
        }

        header {
            width: 100%; padding: 25px 0; text-align: center; background-color: var(--card-bg);
            border-bottom: 1px solid #30363d; margin-bottom: 20px; position: relative;
        }
        header h1 { margin: 0; font-size: 2.2rem; font-weight: bold; color: var(--primary); }
        
        .menu-btn { position: absolute; top: 25px; right: 20px; font-size: 28px; cursor: pointer; background: none; border:none; color: var(--text-muted); transition: 0.3s; z-index: 100; }
        .admin-lock { position: absolute; top: 25px; left: 20px; font-size: 22px; cursor: pointer; background: none; border: none; color: var(--text-muted); opacity: 0.5; }

        .container { width: 92%; max-width: 900px; display: flex; flex-direction: column; gap: 20px; flex-grow: 1; }

        /* القائمة الجانبية المطورة */
        .sidebar {
            position: fixed; top: 0; right: -320px; width: 300px; height: 100%; background-color: #0d1117;
            border-left: 2px solid var(--primary); z-index: 3000; transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: -5px 0 20px rgba(0,0,0,0.8); padding: 20px; overflow-y: auto; text-align: right;
        }
        .sidebar.open { right: 0; }
        .close-sidebar { color: var(--danger); font-size: 30px; cursor: pointer; font-weight: bold; float: left; margin-bottom: 20px; }

        /* بروفايل المستخدم جوه السايد بار */
        .sidebar-auth { background: #161b22; padding: 15px; border-radius: 12px; margin-bottom: 25px; border: 1px solid #333; text-align: center; }
        .user-profile-side { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .user-profile-side img { width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--primary); }
        .login-btn-side { width: 100%; background: #fff; color: #000; padding: 10px; border-radius: 8px; font-weight: bold; border: none; cursor: pointer; margin-top: 10px; }

        .sidebar-section { margin-bottom: 30px; }
        .sidebar-title { color: var(--primary); border-bottom: 1px solid #333; padding-bottom: 10px; font-size: 18px; margin-top: 0; display: flex; align-items: center; gap: 8px; }
        
        .leaderboard-item { display: flex; justify-content: space-between; align-items: center; background: #1c2128; padding: 10px; border-radius: 8px; margin-bottom: 8px; border-left: 3px solid transparent; }
        .leaderboard-item.rank-1 { border-left-color: var(--gold); background: rgba(255, 215, 0, 0.05); }
        .player-info { display: flex; align-items: center; gap: 10px; }
        .player-info img { width: 25px; height: 25px; border-radius: 50%; }

        /* كروت المواد والمحاضرات */
        .admin-panel { display: none; background-color: rgba(46, 160, 67, 0.1); border: 1px solid var(--success); padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
        .subject-card { background-color: var(--card-bg); padding: 20px; border-radius: 8px; text-align: center; cursor: pointer; border: 1px solid #30363d; transition: 0.2s; }
        .subject-card:hover { border-color: var(--primary); transform: translateY(-3px); }

        .item-card { background-color: var(--card-bg); padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #30363d; transition: 0.3s; }
        .item-card.viewed { border-color: var(--primary); box-shadow: 0 0 10px rgba(88, 166, 255, 0.1); }
        
        /* العين النيون */
        .eye-icon { font-size: 20px; color: #444; transition: 0.4s; }
        .eye-icon.active { color: var(--primary); text-shadow: 0 0 12px var(--primary); transform: scale(1.1); }

        .item-card a { color: white; text-decoration: none; font-size: 17px; font-weight: bold; cursor: pointer; }
        .progress-box { margin-top: 15px; background: #0d1117; border-radius: 8px; padding: 10px; display: flex; align-items: center; gap: 10px; }
        input[type="range"] { flex-grow: 1; accent-color: var(--primary); }

        .modal { display: none; position: fixed; z-index: 4000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.9); backdrop-filter: blur(8px); }
        .modal-content { background-color: var(--card-bg); margin: 2% auto; padding: 20px; border-radius: 15px; width: 95%; max-width: 850px; position: relative; }
        .close-modal { color: var(--danger); position: absolute; left: 20px; top: 15px; font-size: 35px; cursor: pointer; }
        .modal-iframe { width: 100%; height: 75vh; border: none; border-radius: 10px; }

        .btn-tahaldi { background: var(--success); color: #000; padding: 8px 15px; border-radius: 20px; font-weight: bold; border: none; cursor: pointer; margin-top: 10px; font-size: 13px; }
    </style>
</head>
<body>

    <audio id="alarmSound" src="https://cdn.pixabay.com/download/audio/2022/03/10/audio_c8b8f722cb.mp3?filename=red-alert-ambar-alert-warning-siren-100052.mp3" preload="auto"></audio>

    <div id="sidebar" class="sidebar">
        <span class="close-sidebar" onclick="toggleSidebar()">&times;</span>
        
        <div class="sidebar-auth" id="authSection">
            <button class="login-btn-side" onclick="signInWithGoogle()">🔑 دخول للتحدي بجوجل</button>
        </div>

        <div class="sidebar-section">
            <h2 class="sidebar-title">🏆 دوري الدحيحة</h2>
            <div id="leaderboardList"></div>
        </div>

        <div class="sidebar-section">
            <h2 class="sidebar-title">🕒 سجل المذاكرة</h2>
            <div id="historyList"></div>
        </div>
    </div>

    <header>
        <button class="menu-btn" onclick="toggleSidebar()">☰</button>
        <button class="admin-lock" onclick="toggleAdmin()" id="lockBtn">🔒</button>
        <h1>Work Space</h1>
        <p>دفعة 2026 - محاضرات وملخصات</p>
        <button class="btn-tahaldi" onclick="toggleSidebar()">🔥 لوحة التحدي</button>
    </header>

    <div class="container">
        <div id="homeView">
            <div class="admin-panel admin-only" id="adminFolderPanel">
                <input type="text" id="subjectName" placeholder="اسم المادة">
                <button onclick="addSubject()" style="margin-top:10px; width:100%;">➕ إضافة مادة</button>
            </div>
            <div class="grid" id="subjectsGrid"></div>
        </div>

        <div id="insideFolder" style="display:none;">
            <div class="header-actions">
                <h2 id="currentSubjectTitle" style="color: white; margin: 0;"></h2>
                <button onclick="goBack()" style="background:#333; padding:8px 15px;">🔙 رجوع</button>
            </div>
            <div class="admin-panel admin-only" id="adminLinksPanel">
                <input type="text" id="linkTitle" placeholder="العنوان">
                <input type="url" id="linkUrl" placeholder="الرابط">
                <button onclick="addLink()" style="margin-top:10px; width:100%;">حفظ</button>
            </div>
            <div id="linksList"></div>
        </div>
    </div>

    <div id="lectureModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <h3 id="modalTitle" style="color: var(--primary); text-align: right;"></h3>
            <div id="modalBody"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyABSlC3WQDIBARoaQbV9XBAXC5Kull6jH8",
            authDomain: "work-space-8e87e.firebaseapp.com",
            projectId: "work-space-8e87e",
            storageBucket: "work-space-8e87e.firebasestorage.app",
            messagingSenderId: "907214357711",
            appId: "1:907214357711:web:086e46dd6d4e74bac863ba"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const provider = new firebase.auth.GoogleAuthProvider();

        let currentUser = null;
        let lectureStartTime = 0;
        let isAdmin = false;
        let subjects = [];
        let currentSubjectId = null;
        let watchHistory = JSON.parse(localStorage.getItem('ws_history')) || {};

        // تسجيل الدخول
        auth.onAuthStateChanged((user) => {
            const authSection = document.getElementById('authSection');
            if (user) {
                currentUser = user;
                authSection.innerHTML = `
                    <div class="user-profile-side">
                        <img src="${user.photoURL}" alt="user">
                        <span>أهلاً، <b>${user.displayName.split(" ")[0]}</b> 👋</span>
                        <button onclick="auth.signOut()" style="font-size:10px; background:none; color:var(--danger); border:none; cursor:pointer;">تسجيل خروج</button>
                    </div>`;
                db.collection("users").doc(user.uid).set({ name: user.displayName, photo: user.photoURL }, { merge: true });
            } else {
                currentUser = null;
                authSection.innerHTML = `<button class="login-btn-side" onclick="signInWithGoogle()">🔑 دخول للتحدي بجوجل</button>`;
            }
        });

        function signInWithGoogle() { auth.signInWithPopup(provider).catch(e => alert("تأكد من إعدادات الـ Auth في فايربيز!")); }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); renderHistory(); }

        // جلب الدوري
        db.collection("users").orderBy("points", "desc").limit(10).onSnapshot(snap => {
            const list = document.getElementById('leaderboardList');
            list.innerHTML = '';
            snap.forEach((doc, i) => {
                const d = doc.data();
                list.innerHTML += `
                    <div class="leaderboard-item ${i === 0 ? 'rank-1' : ''}">
                        <div class="player-info">
                            <span style="font-size:12px;">#${i+1}</span>
                            <img src="${d.photo || ''}">
                            <span style="font-size:13px;">${d.name.split(" ")[0]}</span>
                        </div>
                        <span style="color:var(--success); font-weight:bold;">${d.points || 0}</span>
                    </div>`;
            });
        });

        db.collection("subjects").onSnapshot(snap => {
            subjects = []; snap.forEach(doc => subjects.push({ id: doc.id, ...doc.data() }));
            if(currentSubjectId) renderLinks(); else renderSubjects();
        });

        function renderSubjects() {
            const grid = document.getElementById('subjectsGrid'); grid.innerHTML = '';
            subjects.forEach(s => {
                const card = document.createElement('div'); card.className = 'subject-card'; card.onclick = () => openSubject(s.id, s.name);
                card.innerHTML = `<div>📁</div><div style="font-weight:bold;">${s.name}</div><div style="font-size:11px; color:gray;">${s.links ? s.links.length : 0} محاضرة</div>`;
                if(isAdmin) card.innerHTML += `<button class="danger-btn" onclick="event.stopPropagation(); deleteSubject('${s.id}')">حذف</button>`;
                grid.appendChild(card);
            });
        }

        function openSubject(id, name) {
            currentSubjectId = id; document.getElementById('homeView').style.display = 'none';
            document.getElementById('insideFolder').style.display = 'block'; document.getElementById('currentSubjectTitle').innerText = name;
            renderLinks();
        }

        function goBack() { currentSubjectId = null; document.getElementById('insideFolder').style.display = 'none'; document.getElementById('homeView').style.display = 'block'; renderSubjects(); }

        function openLectureModal(url, title, idx) {
            if(!currentUser) alert("سجل دخول عشان تحسب نقطك!");
            lectureStartTime = Date.now();
            const modal = document.getElementById('lectureModal');
            document.getElementById('modalTitle').innerText = title;
            const body = document.getElementById('modalBody');
            
            // نحدث العين فورا
            document.getElementById('eye-'+idx).classList.add('active');
            document.getElementById('card-'+idx).classList.add('viewed');

            let embed = url;
            if(url.includes('youtube.com/watch')) embed = url.replace('watch?v=', 'embed/');
            else if(url.includes('drive.google.com')) embed = url.replace('/view', '/preview');

            if(url.includes('teams.microsoft.com')) {
                body.innerHTML = `<div style="padding:50px; text-align:center;">مايكروسوفت بتمنع العرض هنا.. <br><br><a href="${url}" target="_blank" style="color:var(--primary); font-weight:bold;">اضغط هنا للفتح في Teams 🚀</a><p style="font-size:11px; color:gray; margin-top:20px;">وقت المذاكرة شغال.. لما تخلص اقفل الشاشة دي.</p></div>`;
            } else {
                body.innerHTML = `<iframe class="modal-iframe" src="${embed}" allowfullscreen></iframe>`;
            }
            modal.style.display = 'block';
        }

        function closeModal() {
            if(currentUser && lectureStartTime > 0) {
                const mins = Math.floor((Date.now() - lectureStartTime) / 60000);
                const pts = 5 + (mins * 2);
                db.collection("users").doc(currentUser.uid).update({ points: firebase.firestore.FieldValue.increment(pts) });
            }
            document.getElementById('lectureModal').style.display = 'none';
        }

        function renderLinks() {
            const list = document.getElementById('linksList'); list.innerHTML = '';
            const s = subjects.find(x => x.id === currentSubjectId);
            if(!s || !s.links) return;
            s.links.forEach((l, i) => {
                const hist = watchHistory[l.url] || { progress: 0 };
                const card = document.createElement('div');
                card.className = `item-card ${hist.progress > 0 ? 'viewed' : ''}`;
                card.id = `card-${i}`;
                card.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <div style="display:flex; align-items:center; gap:10px;">
                            <span id="eye-${i}" class="eye-icon ${hist.progress > 0 ? 'active' : ''}">👁️</span>
                            <a onclick="openLectureModal('${l.url}', '${l.title}', ${i})">${l.title}</a>
                        </div>
                        ${isAdmin ? `<button class="danger-btn" onclick="deleteLink(${i})">حذف</button>` : ''}
                    </div>
                    <div class="progress-box">
                        <span style="font-size:10px;">وصلت لفين؟</span>
                        <input type="range" value="${hist.progress}" onchange="saveProg('${l.url}', '${l.title}', this.value)">
                    </div>`;
                list.appendChild(card);
            });
        }

        function saveProg(url, title, val) {
            watchHistory[url] = { title, progress: val, time: Date.now() };
            localStorage.setItem('ws_history', JSON.stringify(watchHistory));
            renderLinks();
        }

        function renderHistory() {
            const h = document.getElementById('historyList'); h.innerHTML = '';
            Object.keys(watchHistory).forEach(k => {
                h.innerHTML += `<div style="background:#1c2128; padding:8px; margin-bottom:5px; border-radius:5px; font-size:12px;">${watchHistory[k].title} (${watchHistory[k].progress}%)</div>`;
            });
        }

        function toggleAdmin() {
            const p = prompt("كلمة السر:");
            if(p === "admin@2026") { isAdmin = true; document.querySelectorAll('.admin-only').forEach(e => e.style.display = 'block'); renderSubjects(); }
        }

        function addSubject() {
            const n = document.getElementById('subjectName').value;
            if(n) db.collection("subjects").add({ name: n, links: [] });
        }

        function deleteSubject(id) { if(confirm("حذف؟")) db.collection("subjects").doc(id).delete(); }

        function addLink() {
            const t = document.getElementById('linkTitle').value;
            const u = document.getElementById('linkUrl').value;
            if(t && u) db.collection("subjects").doc(currentSubjectId).update({ links: firebase.firestore.FieldValue.arrayUnion({ title: t, url: u, addedAt: Date.now() }) });
        }

        function deleteLink(idx) {
            const s = subjects.find(x => x.id === currentSubjectId);
            const link = s.links[idx];
            db.collection("subjects").doc(currentSubjectId).update({ links: firebase.firestore.FieldValue.arrayRemove(link) });
        }
    </script>
</body>
</html>
