<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work Space - Mahmoud Gamal</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    
    <style>
        :root {
            --bg-color: #0d1117; --card-bg: #161b22; --primary: #58a6ff;
            --text-main: #c9d1d9; --text-muted: #8b949e; --danger: #f85149;
            --success: #2ea043; --warning: #d29922; --gold: #ffd700;
            --silver: #C0C0C0; --bronze: #CD7F32;
        }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        
        /* الهيدر */
        header { width: 100%; padding: 25px 0; text-align: center; background-color: var(--card-bg); border-bottom: 1px solid #30363d; margin-bottom: 20px; position: relative; }
        header h1 { margin: 0; font-size: 2rem; color: var(--primary); }
        .menu-btn { position: absolute; top: 25px; right: 20px; font-size: 28px; cursor: pointer; background: none; border:none; color: var(--text-muted); z-index: 100; }
        .admin-lock { position: absolute; top: 25px; left: 20px; font-size: 18px; cursor: pointer; background: none; border: none; color: var(--text-muted); opacity: 0.2; }
        .btn-tahaldi { background: var(--success); color: #000; padding: 8px 18px; border-radius: 20px; font-weight: bold; border: none; cursor: pointer; margin-top: 10px; box-shadow: 0 0 10px rgba(46, 160, 67, 0.2); }

        .container { width: 92%; max-width: 900px; display: flex; flex-direction: column; gap: 20px; flex-grow: 1; }

        /* الشريط الجانبي */
        .sidebar { position: fixed; top: 0; right: -360px; width: 340px; height: 100%; background-color: #0d1117; border-left: 2px solid var(--primary); z-index: 3000; transition: right 0.4s ease; box-shadow: -5px 0 20px rgba(0,0,0,0.8); padding: 20px; overflow-y: auto; text-align: right; }
        .sidebar.open { right: 0; }
        .close-sidebar { color: var(--danger); font-size: 30px; cursor: pointer; float: left; }
        
        .sidebar-auth { background: #1c2128; padding: 15px; border-radius: 12px; margin: 40px 0 20px 0; border: 1px solid var(--primary); text-align: center; }
        .login-btn-side { width: 100%; background: #fff; color: #000; padding: 12px; border-radius: 8px; font-weight: bold; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .user-profile-side { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .user-profile-side img { width: 65px; height: 65px; border-radius: 50%; border: 2px solid var(--primary); object-fit: cover; }

        .sidebar-section { margin-bottom: 30px; }
        .sidebar-title { color: var(--primary); border-bottom: 1px solid #333; padding-bottom: 8px; font-size: 18px; margin-bottom: 15px; }

        /* جدول الدحيحة الجديد */
        .lb-table { width: 100%; border-collapse: collapse; font-size: 12px; background: #161b22; border-radius: 8px; overflow: hidden; }
        .lb-table th { background: #1c2128; color: var(--primary); padding: 10px 5px; border-bottom: 2px solid #30363d; text-align: center; }
        .lb-table td { padding: 8px 5px; border-bottom: 1px solid #30363d; text-align: center; vertical-align: middle; }
        .lb-table tr:hover { background: rgba(88, 166, 255, 0.05); }
        
        .lb-name { display: flex; align-items: center; gap: 8px; text-align: right; justify-content: flex-start; padding-right: 5px; }
        .lb-name img { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; transition: 0.3s; background: #fff; }
        
        /* إطارات الأبطال */
        .rank-1 .lb-name img { border: 2px solid var(--gold); box-shadow: 0 0 10px var(--gold); transform: scale(1.1); }
        .rank-2 .lb-name img { border: 2px solid var(--silver); box-shadow: 0 0 8px var(--silver); transform: scale(1.05); }
        .rank-3 .lb-name img { border: 2px solid var(--bronze); box-shadow: 0 0 8px var(--bronze); }
        .rank-1 { background: rgba(255, 215, 0, 0.05); }

        .history-item { background: #161b22; padding: 12px; border-radius: 8px; margin-bottom: 10px; border-right: 3px solid var(--primary); position: relative; }
        .del-hist { position: absolute; left: 10px; top: 10px; color: var(--danger); cursor: pointer; font-size: 14px; }

        /* الكروت والمحاضرات */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
        .subject-card { background: var(--card-bg); padding: 20px; border-radius: 8px; text-align: center; cursor: pointer; border: 1px solid #30363d; transition: 0.3s; }
        .subject-card:hover { border-color: var(--primary); transform: translateY(-3px); }

        .item-card { background: var(--card-bg); padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #30363d; transition: 0.3s; }
        .item-card.viewed { border-color: var(--primary); box-shadow: 0 0 10px rgba(88, 166, 255, 0.1); }
        .eye-icon { font-size: 20px; color: #444; margin-right: 10px; cursor: pointer; transition: 0.3s; }
        .eye-icon.active { color: var(--primary); text-shadow: 0 0 10px var(--primary); }
        
        .progress-box { margin-top: 12px; display: flex; align-items: center; gap: 10px; background: #0d1117; padding: 8px; border-radius: 8px; }
        input[type="range"] { flex: 1; accent-color: var(--primary); }

        /* المودال */
        .modal { display: none; position: fixed; z-index: 4000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(5px); }
        .modal-content { background: var(--card-bg); margin: 5% auto; padding: 20px; border-radius: 15px; width: 95%; max-width: 850px; position: relative; border: 1px solid var(--primary); }
        .modal-iframe { width: 100%; height: 70vh; border: none; border-radius: 10px; }

        /* ستايل المودال الصغير لتعديل البروفايل */
        .small-modal { max-width: 400px; text-align: center; }
        .input-dark { width: 90%; padding: 10px; margin-bottom: 15px; background: #0d1117; border: 1px solid #30363d; color: white; border-radius: 5px; font-family: inherit; }

        .admin-panel { display: none; background: rgba(46, 160, 67, 0.1); border: 1px solid var(--success); padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        input[type="text"], input[type="url"] { width: 95%; padding: 12px; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: white; margin-bottom: 10px; }

        .ad-container { margin: 10px auto; display: flex; justify-content: center; }
    </style>
</head>
<body>

    <audio id="alarmSound" src="https://cdn.pixabay.com/download/audio/2022/03/10/audio_c8b8f722cb.mp3?filename=red-alert-ambar-alert-warning-siren-100052.mp3" preload="auto"></audio>

    <header>
        <button class="menu-btn" onclick="toggleSidebar()">☰</button>
        <button class="admin-lock" onclick="toggleAdmin()">🔒</button>
        <h1>Work Space</h1>
        <p>ذاكر ونافس زمايلك يا بطل 🏆</p>
        <button class="btn-tahaldi" onclick="toggleSidebar()">🔥 لوحة الصدارة</button>
    </header>

    <div class="ad-container">
        <script type="text/javascript">
            atOptions = { 'key' : '2c561b19eb0e3bfa10d7c2d1509ed9a1', 'format' : 'iframe', 'height' : 50, 'width' : 320, 'params' : {} };
        </script>
        <script type="text/javascript" src="https://www.highperformanceformat.com/2c561b19eb0e3bfa10d7c2d1509ed9a1/invoke.js"></script>
    </div>

    <div id="sidebar" class="sidebar">
        <span class="close-sidebar" onclick="toggleSidebar()">&times;</span>
        <div class="sidebar-auth" id="authSection"></div>

        <div class="sidebar-section">
            <h2 class="sidebar-title">🏆 توب 10 الدفعة</h2>
            <div id="leaderboardList"></div>
        </div>

        <div class="sidebar-section">
            <h2 class="sidebar-title">🕒 سجل مذاكرتك</h2>
            <div id="historyList"></div>
        </div>
    </div>

    <div class="container">
        <div id="homeView">
            <div class="admin-panel admin-only" id="adminFolderPanel">
                <input type="text" id="subjectName" placeholder="اسم المادة">
                <button onclick="addSubject()" style="width:100%; background:var(--success); color:white; padding:10px; border:none; cursor:pointer; border-radius:5px;">إضافة مادة</button>
            </div>
            <div class="grid" id="subjectsGrid">
                <p style="text-align:center; width:100%;">جاري التحميل...</p>
            </div>
        </div>

        <div id="insideFolder" style="display:none;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h2 id="currentSubjectTitle" style="color: white; margin:0;"></h2>
                <button onclick="goBack()" style="background:#333; color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer;">🔙 رجوع</button>
            </div>
            <div class="admin-panel admin-only">
                <input type="text" id="linkTitle" placeholder="عنوان المحاضرة">
                <input type="url" id="linkUrl" placeholder="رابط المحاضرة">
                <button onclick="addLink()" style="width:100%; background:var(--primary); color:white; padding:10px; border:none; cursor:pointer; border-radius:5px;">حفظ اللينك</button>
            </div>
            <div id="linksList"></div>
        </div>
    </div>

    <div id="editProfileModal" class="modal">
        <div class="modal-content small-modal">
            <span style="color:var(--danger); cursor:pointer; font-size:35px; float:left; line-height: 20px;" onclick="document.getElementById('editProfileModal').style.display='none'">&times;</span>
            <h3 style="color:var(--primary); margin-top: 0;">تعديل بياناتك ✏️</h3>
            <p style="font-size: 12px; color: gray; margin-bottom: 15px;">عدل اسمك واختار صورتك من الجهاز</p>
            
            <input type="text" id="editName" class="input-dark" placeholder="اكتب اسمك هنا...">
            
            <div style="text-align: right; margin-bottom: 5px; color: gray; font-size: 12px; width: 90%; margin: 0 auto;">اختار صورة البروفايل (أقل من 1 ميجا):</div>
            <input type="file" id="uploadPhoto" accept="image/*" class="input-dark" style="padding: 8px;">
            
            <button id="saveProfileBtn" onclick="saveProfile()" style="background:var(--success); color:white; border:none; padding:10px 20px; border-radius:5px; cursor:pointer; width:95%; font-weight:bold; margin-top: 10px;">حفظ التعديلات</button>
        </div>
    </div>

    <div id="lectureModal" class="modal">
        <div class="modal-content">
            <span style="color:var(--danger); cursor:pointer; font-size:35px; float:left;" onclick="closeModal()">&times;</span>
            <h3 id="modalTitle" style="color:var(--primary); text-align:right; margin-bottom:15px;"></h3>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        // --- إعدادات فايربيز ---
        const firebaseConfig = {
            apiKey: "AIzaSyABSlC3WQDIBARoaQbV9XBAXC5Kull6jH8",
            authDomain: "work-space-8e87e.firebaseapp.com",
            projectId: "work-space-8e87e",
            storageBucket: "work-space-8e87e.firebasestorage.app",
            messagingSenderId: "907214357711",
            appId: "1:907214357711:web:086e46dd6d4e74bac863ba"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const provider = new firebase.auth.GoogleAuthProvider();

        let currentUser = null;
        let lectureStartTime = 0;
        let isAdmin = false;
        let subjects = [];
        let currentSubjectId = null;
        let watchHistory = JSON.parse(localStorage.getItem('ws_history')) || {};

        // جلب أول حرف من الاسم عشان لو معندوش صورة
        function getInitialsImage(name) {
            return `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=random&color=fff&bold=true`;
        }

        // --- نظام تسجيل الدخول (Popup) ---
        function signInWithGoogle() {
            auth.signInWithPopup(provider).catch((error) => {
                console.error("خطأ في الدخول: ", error.message);
                alert("معلش حصلت مشكلة: " + error.message);
            });
        }

        auth.onAuthStateChanged((user) => {
            const authSection = document.getElementById('authSection');
            if (user) {
                currentUser = user;
                
                // جلب بيانات الطالب من الداتابيز عشان نجيب الصورة المرفوعة بنظام Base64
                db.collection("users").doc(user.uid).get().then(doc => {
                    let userData = doc.exists ? doc.data() : null;
                    let displayImg = getInitialsImage(user.displayName || "طالب");

                    // بنشوف هل مخزن صورته في الداتابيز ولا جوجل ولا نستخدم أول حرف
                    if (userData && userData.photo && userData.photo.trim() !== '') {
                        displayImg = userData.photo;
                    } else if (user.photoURL && user.photoURL.trim() !== '') {
                        displayImg = user.photoURL;
                    }
                    
                    authSection.innerHTML = `
                        <div class="user-profile-side">
                            <img src="${displayImg}" alt="user" onerror="this.src='${getInitialsImage("U")}'">
                            <span style="font-size: 16px;">أهلاً، <b>${(user.displayName || "طالب").split(" ")[0]}</b></span>
                            <div style="display: flex; gap: 10px; margin-top: 5px;">
                                <button onclick="openEditProfile()" style="font-size:12px; background:var(--primary); color:white; padding:5px 15px; border-radius:5px; border:none; cursor:pointer;">تعديل بروفايلي</button>
                                <button onclick="auth.signOut().then(()=>location.reload())" style="font-size:12px; background:var(--danger); color:white; padding:5px 15px; border-radius:5px; border:none; cursor:pointer;">خروج</button>
                            </div>
                        </div>`;
                    
                    if (!doc.exists) {
                        db.collection("users").doc(user.uid).set({ 
                            name: user.displayName || "طالب", 
                            photo: user.photoURL || "", 
                            points: 0,
                            studyTime: 0 
                        });
                    }
                });
            } else {
                currentUser = null;
                authSection.innerHTML = `<button class="login-btn-side" onclick="signInWithGoogle()">🔑 دخول بالتحدي بجوجل</button>`;
            }
        });

        // --- تعديل البروفايل ورفع الصورة (بنظام Base64 المجاني) ---
        function openEditProfile() {
            if(!currentUser) return;
            document.getElementById('editName').value = currentUser.displayName || '';
            document.getElementById('uploadPhoto').value = ''; 
            document.getElementById('editProfileModal').style.display = 'block';
        }

        function saveProfile() {
            const newName = document.getElementById('editName').value;
            const fileInput = document.getElementById('uploadPhoto');
            const file = fileInput.files[0];
            const btn = document.getElementById('saveProfileBtn');
            
            if(!newName) { alert("اكتب اسمك يا بطل!"); return; }
            
            btn.innerText = "جاري الحفظ... ⏳";
            btn.disabled = true;

            // لو اختار صورة جديدة
            if (file) {
                // منع رفع صور حجمها أكبر من 1 ميجا عشان الداتابيز متتقلش
                if (file.size > 1048576) {
                    alert("الصورة مساحتها كبيرة جداً! اختار صورة أقل من 1 ميجا.");
                    btn.innerText = "حفظ التعديلات";
                    btn.disabled = false;
                    return;
                }

                // تحويل الصورة لنص (Base64) وحفظها
                const reader = new FileReader();
                reader.onloadend = function() {
                    const base64String = reader.result;
                    db.collection("users").doc(currentUser.uid).update({
                        name: newName,
                        photo: base64String
                    }).then(() => finishSave(newName, btn)).catch(e => showError(e, btn));
                };
                reader.readAsDataURL(file);
            } else {
                // لو مرفعش صورة هيحدث الاسم بس
                db.collection("users").doc(currentUser.uid).update({ name: newName })
                  .then(() => finishSave(newName, btn))
                  .catch(e => showError(e, btn));
            }
        }

        function finishSave(newName, btn) {
            currentUser.updateProfile({ displayName: newName }).then(() => {
                document.getElementById('editProfileModal').style.display = 'none';
                alert("تم حفظ التعديلات بنجاح! 💪");
                location.reload();
            });
        }

        function showError(e, btn) {
            alert("حصلت مشكلة: " + e.message);
            btn.innerText = "حفظ التعديلات";
            btn.disabled = false;
        }

        // --- جلب البيانات وعمل الجدول ---
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); renderHistory(); }

        db.collection("users").orderBy("points", "desc").limit(10).onSnapshot(snap => {
            const list = document.getElementById('leaderboardList');
            let html = `<table class="lb-table">
                            <tr>
                                <th>المركز</th>
                                <th style="text-align: right;">الاسم</th>
                                <th>الوقت</th>
                                <th>النقط</th>
                            </tr>`;
            
            let i = 0; 
            snap.forEach((doc) => {
                const d = doc.data();
                let rankClass = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : '';
                let rankIcon = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `<b>#${i+1}</b>`;
                let mins = d.studyTime || 0;
                let timeStr = mins > 60 ? `${Math.floor(mins/60)}س و ${mins%60}د` : `${mins} دقيقة`;
                
                let userImg = d.photo && d.photo.trim() !== '' ? d.photo : getInitialsImage(d.name || "طالب");
                
                html += `
                    <tr class="${rankClass}">
                        <td>${rankIcon}</td>
                        <td class="lb-name">
                            <img src="${userImg}" onerror="this.src='${getInitialsImage("U")}'">
                            <span>${(d.name || "طالب").split(" ")[0]}</span>
                        </td>
                        <td style="color:#8b949e;">${timeStr}</td>
                        <td style="color:var(--success); font-weight:bold;">${d.points || 0}</td>
                    </tr>`;
                i++;
            });
            html += `</table>`;
            list.innerHTML = html;
        });

        db.collection("subjects").onSnapshot(snap => {
            subjects = []; snap.forEach(doc => subjects.push({ id: doc.id, ...doc.data() }));
            if(currentSubjectId) renderLinks(); else renderSubjects();
        });

        function renderSubjects() {
            const grid = document.getElementById('subjectsGrid'); grid.innerHTML = '';
            subjects.forEach(s => {
                const card = document.createElement('div'); card.className = 'subject-card'; card.onclick = () => openSubject(s.id, s.name);
                card.innerHTML = `<div style="font-size:35px;">📁</div><div style="font-weight:bold;">${s.name}</div><div style="font-size:11px; color:gray;">${s.links ? s.links.length : 0} محاضرة</div>`;
                grid.appendChild(card);
            });
        }

        function openSubject(id, name) { currentSubjectId = id; document.getElementById('homeView').style.display='none'; document.getElementById('insideFolder').style.display='block'; document.getElementById('currentSubjectTitle').innerText=name; renderLinks(); }
        function goBack() { currentSubjectId = null; document.getElementById('insideFolder').style.display='none'; document.getElementById('homeView').style.display='block'; renderSubjects(); }

        // --- فتح المحاضرة وحساب الوقت ---
        function openLectureModal(url, title, idx) {
            if(!currentUser) { alert("سجل دخول الأول عشان تدخل الدوري!"); toggleSidebar(); return; }
            lectureStartTime = Date.now();
            const modal = document.getElementById('lectureModal');
            document.getElementById('modalTitle').innerText = title;
            const body = document.getElementById('modalBody');
            
            saveProg(url, title, watchHistory[url] ? watchHistory[url].progress : 0);

            let embed = url;
            if(url.includes('youtube.com/watch')) embed = url.replace('watch?v=', 'embed/');
            else if(url.includes('drive.google.com')) embed = url.replace('/view', '/preview');

            if(url.includes('teams.microsoft.com') || url.includes('sharepoint.com')) {
                body.innerHTML = `
                <div style="padding:40px; text-align:center;">
                    <div style="font-size:50px;">🚀</div>
                    <h3>المحاضرة على Teams</h3>
                    <p style="color:gray;">اضغط تحت عشان تفتحها في تطبيق تيمز..</p>
                    <a href="${url}" target="_blank" style="display:inline-block; margin-top:15px; padding:12px 25px; background:var(--primary); color:black; font-weight:bold; text-decoration:none; border-radius:10px;">فتح الآن</a>
                    <p style="margin-top:30px; font-size:12px; color:var(--success);">💡 العداد شغال.. لما تخلص مذاكرة ارجع هنا واقفل الشاشة دي عشان نقطك تزيد!</p>
                </div>`;
            } else {
                body.innerHTML = `<iframe class="modal-iframe" src="${embed}" allowfullscreen></iframe>`;
            }
            modal.style.display = 'block';
            renderLinks();
        }

        function closeModal() {
            if(currentUser && lectureStartTime > 0) {
                const mins = Math.floor((Date.now() - lectureStartTime) / 60000);
                if(mins >= 1) {
                    const earned = 5 + (mins * 2);
                    db.collection("users").doc(currentUser.uid).update({ 
                        points: firebase.firestore.FieldValue.increment(earned),
                        studyTime: firebase.firestore.FieldValue.increment(mins)
                    });
                } else {
                    db.collection("users").doc(currentUser.uid).update({ points: firebase.firestore.FieldValue.increment(1) });
                }
            }
            document.getElementById('lectureModal').style.display = 'none';
            lectureStartTime = 0;
            document.getElementById('modalBody').innerHTML = '';
        }

        function toggleEye(event, url) {
            event.stopPropagation();
            if (watchHistory[url] && confirm("عايز تمسح المحاضرة دي من السجل وتطفي العين؟")) {
                delete watchHistory[url];
                localStorage.setItem('ws_history', JSON.stringify(watchHistory));
                renderLinks();
            }
        }

        function renderLinks() {
            const list = document.getElementById('linksList'); list.innerHTML = '';
            const s = subjects.find(x => x.id === currentSubjectId);
            if(!s || !s.links) return;
            s.links.forEach((l, i) => {
                const hist = watchHistory[l.url];
                const card = document.createElement('div');
                card.className = `item-card ${hist ? 'viewed' : ''}`;
                card.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <div style="display:flex; align-items:center;">
                            <span class="eye-icon ${hist ? 'active' : ''}" onclick="toggleEye(event, '${l.url}')">👁️</span>
                            <a onclick="openLectureModal('${l.url}', '${l.title}', ${i})" style="cursor:pointer; font-weight:bold;">${l.title}</a>
                        </div>
                        ${isAdmin ? `<button onclick="deleteLink(${i})" style="background:var(--danger); color:white; border:none; padding:5px 10px; border-radius:5px; cursor:pointer;">حذف</button>` : ''}
                    </div>
                    <div class="progress-box">
                        <span style="font-size:10px; color:gray;">إنجازك:</span>
                        <input type="range" value="${hist ? hist.progress : 0}" onchange="saveProg('${l.url}', '${l.title}', this.value)">
                        <span style="font-size:11px; font-weight:bold; color:var(--primary);">${hist ? hist.progress : 0}%</span>
                    </div>`;
                list.appendChild(card);
            });
        }

        function saveProg(url, title, val) {
            watchHistory[url] = { title, progress: val, time: Date.now() };
            localStorage.setItem('ws_history', JSON.stringify(watchHistory));
            renderLinks();
        }

        function renderHistory() {
            const h = document.getElementById('historyList'); h.innerHTML = '';
            const items = Object.keys(watchHistory).sort((a,b) => watchHistory[b].time - watchHistory[a].time);
            if(items.length === 0) { h.innerHTML = '<p style="color:gray; font-size:12px;">السجل فاضي حالياً..</p>'; return; }
            items.forEach(k => {
                h.innerHTML += `
                    <div class="history-item">
                        <span class="del-hist" onclick="deleteHistoryItem('${k}')">❌</span>
                        <div style="font-weight:bold; color:white; font-size:13px; margin-bottom:5px;">${watchHistory[k].title}</div>
                        <div style="font-size:11px; color:var(--primary);">خلصت: ${watchHistory[k].progress}%</div>
                    </div>`;
            });
        }

        function deleteHistoryItem(url) {
            delete watchHistory[url];
            localStorage.setItem('ws_history', JSON.stringify(watchHistory));
            renderHistory();
            if(currentSubjectId) renderLinks();
        }

        function toggleAdmin() {
            const p = prompt("كلمة السر:");
            if(p === "admin@2026") { isAdmin = !isAdmin; document.querySelectorAll('.admin-only').forEach(e => e.style.display = isAdmin ? 'block' : 'none'); if(currentSubjectId) renderLinks(); else renderSubjects(); }
        }

        function addSubject() {
            const n = document.getElementById('subjectName').value;
            if(n) db.collection("subjects").add({ name: n, links: [] }).then(()=>document.getElementById('subjectName').value='');
        }

        function addLink() {
            const t = document.getElementById('linkTitle').value;
            const u = document.getElementById('linkUrl').value;
            if(t && u) db.collection("subjects").doc(currentSubjectId).update({ links: firebase.firestore.FieldValue.arrayUnion({ title: t, url: u, addedAt: Date.now() }) }).then(()=>{ document.getElementById('linkTitle').value=''; document.getElementById('linkUrl').value=''; });
        }

        function deleteLink(idx) {
            const s = subjects.find(x => x.id === currentSubjectId);
            db.collection("subjects").doc(currentSubjectId).update({ links: firebase.firestore.FieldValue.arrayRemove(s.links[idx]) });
        }
    </script>
</body>
</html>
